<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>律师案件管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;display:flex;min-height:100vh}
:root{--blue:#1890ff;--red:#ff4d4f;--green:#52c41a;--orange:#faad14}
.sidebar{width:220px;background:#001529;color:#fff;flex-shrink:0;position:fixed;height:100vh;left:0;top:0;z-index:100}
.sidebar .logo{padding:20px;font-size:17px;font-weight:bold;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar nav{padding:8px 0}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:12px 20px;color:rgba(255,255,255,.65);text-decoration:none;font-size:13px;cursor:pointer;transition:all .2s}
.sidebar nav a:hover,.sidebar nav a.active{color:#fff;background:rgba(255,255,255,.08);border-right:3px solid var(--blue)}
.sidebar .user{padding:14px 20px;border-top:1px solid rgba(255,255,255,.1);font-size:12px;display:flex;justify-content:space-between;align-items:center}
.sidebar .user button{background:transparent;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.2);padding:4px 10px;border-radius:3px;cursor:pointer;font-size:11px}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;padding:10px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.topbar h2{font-size:17px;font-weight:500}
.content{flex:1;padding:16px 20px;overflow-y:auto}
.card{background:#fff;border-radius:8px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card h3{font-size:15px;margin-bottom:12px;color:#1a3c5e;border-left:3px solid var(--blue);padding-left:10px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:14px}
.stat-card{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);text-align:center;cursor:pointer}
.stat-card .num{font-size:28px;font-weight:bold;color:var(--blue)}.stat-card.red .num{color:var(--red)}.stat-card.green .num{color:var(--green)}.stat-card.orange .num{color:var(--orange)}
.stat-card .label{font-size:12px;color:#999;margin-top:3px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.form-group{display:flex;flex-direction:column}
.form-group label{font-size:11px;color:#888;margin-bottom:3px}
.form-group input,.form-group select,.form-group textarea{padding:7px 10px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue)}
.form-group textarea{min-height:55px;resize:vertical}
.btn{padding:7px 18px;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:500}
.btn-primary{background:var(--blue);color:#fff}.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:#fff;border:1px solid #d9d9d9;color:#666}.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-sm{padding:3px 9px;font-size:11px}.btn-xs{padding:2px 7px;font-size:10px}
.btn-group{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#fafafa;padding:9px 7px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #e8e8e8;white-space:nowrap}
td{padding:8px 7px;border-bottom:1px solid #f0f0f0}tr:hover{background:#fafafa}tr.dim{opacity:.45}
.tag{padding:2px 7px;border-radius:8px;font-size:10px;font-weight:500;display:inline-block}
.t-active{background:#e6f7ff;color:var(--blue)}.t-done{background:#f6ffed;color:var(--green)}.t-pending{background:#fffbe6;color:var(--orange)}.t-red{background:#fff1f0;color:var(--red)}
.search-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-row input,.search-row select{padding:7px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:12px;outline:none}
.search-row input{flex:1;min-width:180px}
.empty{text-align:center;padding:40px;color:#bbb;font-size:13px}
.schedule-item{padding:12px 16px;border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;font-size:13px;border-left:5px solid var(--blue);background:linear-gradient(135deg,#e6f7ff 0%,#fff 100%)}
.days-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.days-red{background:var(--red);color:#fff}.days-orange{background:var(--orange);color:#fff}.days-blue{background:var(--blue);color:#fff}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.calendar .day-header{font-size:11px;color:#999;padding:4px 0}
.calendar .day{min-height:65px;display:flex;flex-direction:column;align-items:center;border-radius:6px;cursor:pointer;font-size:12px;padding:3px 1px;border:1px solid #f5f5f5;overflow:hidden}
.calendar .day:hover{background:#f0f5ff}.calendar .day.today{background:var(--blue);color:#fff;font-weight:bold}
.calendar .day .day-event{font-size:8px;padding:1px 3px;margin:1px 0;border-radius:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.calendar .day .day-event.hearing{background:#fff1f0;color:var(--red)}.calendar .day .day-event.deadline{background:#e6f7ff;color:var(--blue)}
.doc-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #f0f0f0;font-size:13px}
.notice-item{padding:10px;border-bottom:1px solid #f0f0f0;font-size:13px}
.tool-card{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;text-align:center;transition:all .2s}
.tool-card:hover{transform:translateY(-2px);box-shadow:0 3px 8px rgba(0,0,0,.1)}
.tool-card .icon{font-size:28px;margin-bottom:8px}.tool-card .name{font-size:13px;font-weight:500}
.link-card{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border-radius:6px;margin-bottom:6px;font-size:13px;cursor:pointer}
.link-card:hover{background:#f0f5ff}@media(max-width:900px){.sidebar{width:60px}.main{margin-left:60px}}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">⚖ 案管系统</div>
  <nav>
    <a class="active" onclick="navTo('dashboard')">📊 仪表盘</a>
    <a onclick="navTo('cases')">📋 案件管理</a>
    <a onclick="navTo('schedule')">📅 日程管理</a>
    <a onclick="navTo('notices')">📬 法院通知</a>
    <a onclick="navTo('documents')">📁 文档管理</a>
    <a onclick="navTo('tools')">🔧 实用工具</a>
    <a onclick="navTo('links')">🔗 常用网址</a>
    <a onclick="navTo('settings')">⚙ 系统设置</a>
  </nav>
  <div class="user"><span id="sidebarUser">管理员</span></div>
</div>
<div class="main">
  <div class="topbar"><h2 id="pageTitle">📊 仪表盘</h2><span style="font-size:12px;color:#999" id="clock"></span></div>
  <div class="content" id="pageContent"></div>
</div>

<script>
var XLSX_LOADED=false;
</script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js" onload="XLSX_LOADED=true" onerror="XLSX_LOADED=false"></script>
<script>
// Supabase 配置（通过 REST API 访问，无需 SDK）
var API='https://zeoijvshyxuqakruhejz.supabase.co/rest/v1';
var KEY='sb_publishable_i6DaaPEmzECw7RtZ2_O2Yg_Pp-EXMOG';
var H={"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json","Accept":"application/json","Prefer":"return=representation"};
window._supaOK=true;
const LS_C='lawyer_cases',LS_D='lawyer_docs',LS_N='lawyer_notices',LS_T='lawyer_tags';
let cases=JSON.parse(localStorage.getItem(LS_C)||'[]');
let docs=JSON.parse(localStorage.getItem(LS_D)||'[]');
let notices=JSON.parse(localStorage.getItem(LS_N)||'[]');
let tags=JSON.parse(localStorage.getItem(LS_T)||'[]');
function save(){localStorage.setItem(LS_C,JSON.stringify(cases));localStorage.setItem(LS_D,JSON.stringify(docs));localStorage.setItem(LS_N,JSON.stringify(notices));localStorage.setItem(LS_T,JSON.stringify(tags));syncToCloud()}
async function syncToCloud(){
  if(!window._supaOK)return;
  try{
    await fetch(API+'/cases?id=neq.__never__',{method:'DELETE',headers:H});
    await fetch(API+'/docs?id=neq.__never__',{method:'DELETE',headers:H});
    await fetch(API+'/notices?id=neq.__never__',{method:'DELETE',headers:H});
    if(cases.length)await fetch(API+'/cases',{method:'POST',headers:H,body:JSON.stringify(cases)});
    if(docs.length)await fetch(API+'/docs',{method:'POST',headers:H,body:JSON.stringify(docs)});
    if(notices.length)await fetch(API+'/notices',{method:'POST',headers:H,body:JSON.stringify(notices)});
  }catch(e){}
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,6)}
function T(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function P(c){return c.plaintiff||c.client||'—'}
function D(c){return c.defendant||c.opponent||'—'}

const titles={dashboard:'📊 仪表盘',cases:'📋 案件管理',schedule:'📅 日程管理',notices:'📬 法院通知',documents:'📁 文档管理',tools:'🔧 实用工具',links:'🔗 常用网址',settings:'⚙ 系统设置'};
function navTo(page){
  document.querySelectorAll('.sidebar nav a').forEach((a,i)=>{a.classList.toggle('active',i===Object.keys(titles).indexOf(page))});
  document.getElementById('pageTitle').textContent=titles[page];
  const c=document.getElementById('pageContent');
  if(page==='dashboard')c.innerHTML=renderDashboard();
  else if(page==='cases'){c.innerHTML=renderCasesPage();setTimeout(refreshCaseTable,50)}
  else if(page==='schedule')c.innerHTML=renderSchedulePage();
  else if(page==='notices')c.innerHTML=renderNoticesPage();
  else if(page==='documents')c.innerHTML=renderDocumentsPage();
  else if(page==='tools')c.innerHTML=renderToolsPage();
  else if(page==='links')c.innerHTML=renderLinksPage();
  else if(page==='settings')c.innerHTML=renderSettingsPage();
}

// ====== 仪表盘 ======
function renderDashboard(){
  const total=cases.length,active=cases.filter(c=>!c.isClosed).length,done=cases.filter(c=>c.isClosed).length;
  const today=new Date();today.setHours(0,0,0,0);const next7=new Date(today);next7.setDate(next7.getDate()+7);
  const upcoming=cases.filter(c=>!c.isClosed).flatMap(c=>[{l:'开庭',d:c.hearingDate,c:c,t:'hearing'},{l:'举证期限',d:c.evidenceDeadline,c:c,t:'deadline'}].filter(x=>x.d)).sort((a,b)=>new Date(a.d)-new Date(b.d));
  const urgent=upcoming.filter(x=>{const dd=new Date(x.d);return dd>=today&&dd<=next7});
  const typeCount={};cases.forEach(c=>{const t=c.caseType||'其他';typeCount[t]=(typeCount[t]||0)+1});
  const maxT=Math.max(1,...Object.values(typeCount));
  const pending=cases.filter(c=>!c.isClosed&&['待立案','待提交','等仲裁','等仲裁结果'].includes(c.stage||''));
  const trial=cases.filter(c=>!c.isClosed&&['待质证','待开庭'].includes(c.stage||''));
  return`
    <div class="stats"><div class="stat-card" onclick="navTo('cases')"><div class="num">${total}</div><div class="label">案件总数</div></div>
    <div class="stat-card orange"><div class="num">${active}</div><div class="label">未结案</div></div>
    <div class="stat-card green"><div class="num">${done}</div><div class="label">已结案</div></div>
    <div class="stat-card red"><div class="num">${urgent.length}</div><div class="label">7天内到期</div></div></div>
    <div class="card" style="border:2px solid ${urgent.length>0?'var(--red)':'#e8e8e8'};background:${urgent.length>0?'linear-gradient(135deg,#fff1f0 0%,#fff 100%)':'#fff'}"><h3 style="color:${urgent.length>0?'var(--red)':''};font-size:16px">${urgent.length>0?'🔴':'✅'} 紧急事项 — 7天内到期（${urgent.length}项）</h3>${urgent.length?urgent.map(x=>{const diff=Math.ceil((new Date(x.d)-today)/86400000);const bc=diff===0?'days-red':diff<=2?'days-orange':'days-blue';const bt=diff===0?'⚠️ 今天':diff===1?'⚠️ 明天':diff+'天后';return`<div class="schedule-item" style="border-left-color:${x.t==='hearing'?'var(--red)':'var(--blue)'}"><span><strong>${x.l}</strong>：<span style="font-size:15px;font-weight:600;color:${diff<=2?'var(--red)':'var(--blue)'}">${(x.d||'').replace(/^\d{4}-/,'').replace('T',' ').slice(0,11)}</span></span><span style="display:flex;align-items:center;gap:12px"><span style="font-size:12px">${x.c.caseNo||'无案号'} | ${P(x.c)}</span><span class="days-badge ${bc}">${bt}</span></span></div>`}).join(''):'<div class="empty">✅ 暂无紧急事项</div>'}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="card"><h3>📋 待立案/待提交/等仲裁</h3><div style="text-align:center;padding:10px"><div style="font-size:36px;font-weight:bold;color:${pending.length>0?'var(--orange)':'var(--green)'}">${pending.length}</div><div style="font-size:13px;color:#999">件待处理</div></div>${pending.map(x=>`<div style="padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:12px;display:flex;justify-content:space-between"><span>${x.caseNo||'无案号'} ${P(x)}</span><span class="tag t-pending">${x.stage}</span></div>`).join('')}</div>
      <div class="card"><h3>⚖ 待质证/待开庭</h3><div style="text-align:center;padding:10px"><div style="font-size:36px;font-weight:bold;color:${trial.length>0?'var(--red)':'var(--green)'}">${trial.length}</div><div style="font-size:13px;color:#999">件待质证/待开庭</div></div>${trial.map(x=>`<div style="padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:12px;display:flex;justify-content:space-between"><span>${x.caseNo||'无案号'} ${P(x)}</span><span style="color:var(--orange)">${x.hearingDate?(x.hearingDate.replace(/^\d{4}-/,'').replace('T',' ').slice(0,11)):'未定'}</span></div>`).join('')}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="card"><h3>📬 最近法院通知</h3>${(()=>{const rn=notices.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5);return rn.length?rn.map(n=>{const c=cases.find(x=>x.id===n.caseId);return`<div style="padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:12px"><span class="tag t-pending">${n.type}</span> ${n.date||''} | ${c?P(c):'未关联'} | ${n.note||''}</div>`}).join(''):'<div class="empty">暂无通知</div>'})()}</div>
      <div class="card"><h3>📅 今日待办</h3>${(()=>{const ts=T();const te=cases.filter(c=>!c.isClosed).flatMap(c=>[{l:'开庭',d:c.hearingDate,c:c},{l:'举证期限',d:c.evidenceDeadline,c:c}].filter(x=>x.d&&x.d.startsWith(ts)));return te.length?te.map(e=>`<div style="padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:12px;font-weight:600;color:var(--red)">⚠️ ${e.l} | ${e.c.caseNo||'无案号'} | ${P(e.c)}</div>`).join(''):'<div class="empty">📌 今日无待办</div>'})()}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px">
      <div class="card" style="padding:10px"><h3 style="font-size:12px;margin-bottom:4px">案件类型统计</h3><div style="display:flex;align-items:flex-end;gap:12px;height:60px;padding:4px 0">${Object.entries(typeCount).map(([k,v])=>`<div style="display:flex;flex-direction:column;align-items:center;flex:1"><div style="font-size:11px;font-weight:bold">${v}</div><div style="width:30px;border-radius:3px 3px 0 0;background:hsl(${Math.random()*360},55%,55%);height:${v/maxT*50}px"></div><div style="font-size:9px;color:#888;margin-top:2px">${k}</div></div>`).join('')}</div></div>
      <div class="card" style="padding:10px"><h3 style="font-size:12px;margin-bottom:4px">案件状态</h3><div style="display:flex;align-items:flex-end;gap:20px;height:60px;padding:4px 0;justify-content:center"><div style="display:flex;flex-direction:column;align-items:center"><div style="font-size:14px;font-weight:bold;color:var(--blue)">${active}</div><div style="width:30px;border-radius:3px 3px 0 0;background:var(--blue);height:${active/Math.max(1,active,done)*50}px"></div><div style="font-size:9px;color:#888;margin-top:2px">未结案</div></div><div style="display:flex;flex-direction:column;align-items:center"><div style="font-size:14px;font-weight:bold;color:var(--green)">${done}</div><div style="width:30px;border-radius:3px 3px 0 0;background:var(--green);height:${done/Math.max(1,active,done)*50}px"></div><div style="font-size:9px;color:#888;margin-top:2px">已结案</div></div></div></div>
    </div>`;
}

// ====== 案件管理 ======
function renderCasesPage(){
  const typeOpts=[...new Set(cases.map(c=>c.caseType).filter(Boolean))].map(t=>`<option>${t}</option>`).join('');
  return`<div class="search-row"><input type="text" id="csSearch" placeholder="搜索..." oninput="refreshCaseTable()"><select id="csClosed" onchange="refreshCaseTable()"><option value="">全部</option><option value="0">未结案</option><option value="1">已结案</option></select><select id="csType" onchange="refreshCaseTable()"><option value="">全部案由</option>${typeOpts}</select></div>
  <div class="btn-group" style="margin-bottom:10px"><button class="btn btn-primary" onclick="showCaseForm()">➕ 新增</button><button class="btn btn-danger btn-sm" onclick="batchDelete()">🗑 批量删除</button><button class="btn btn-outline btn-sm" onclick="toggleFS()">📺 全屏</button></div>
  <div class="card" style="overflow-x:auto"><table><thead><tr><th><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th><th>接收日期</th><th>原告</th><th>被告</th><th>案由</th><th>管辖法院</th><th>是否保全</th><th>进行阶段</th><th>开庭时间</th><th>案号</th><th>承办法官</th><th>是否结案</th><th>操作</th></tr></thead><tbody id="caseTbody"></tbody></table></div>`;
}
function refreshCaseTable(){
  const s=(document.getElementById('csSearch')?.value||'').toLowerCase(),closed=document.getElementById('csClosed')?.value||'',tp=document.getElementById('csType')?.value||'';
  const filtered=cases.filter(c=>{if(closed==='1'&&!c.isClosed)return false;if(closed==='0'&&c.isClosed)return false;if(tp&&c.caseType!==tp)return false;if(s){const h=(c.caseNo+(c.plaintiff||c.client||'')+(c.defendant||c.opponent||'')+c.caseType+c.court+c.judge+(c.stage||'')).toLowerCase();if(!h.includes(s))return false}return true});
  filtered.sort((a,b)=>(a.isClosed?3:0)-(b.isClosed?3:0)||(['待提交','待立案'].includes(a.stage||'')?0:((a.stage||'').includes('待')?1:2))-(['待提交','待立案'].includes(b.stage||'')?0:((b.stage||'').includes('待')?1:2))||new Date(b.receiveDate||b.createdAt||0)-new Date(a.receiveDate||a.createdAt||0));
  const el=document.getElementById('caseTbody');if(!el)return;
  el.innerHTML=filtered.length?filtered.map(c=>`<tr class="${c.isClosed?'dim':''}"><td><input type="checkbox" class="caseCheck" value="${c.id}"></td><td>${(c.receiveDate||c.createdAt||'').split('T')[0]}</td><td>${P(c)}</td><td>${D(c)}</td><td>${c.caseType||'—'}</td><td>${c.court||'—'}</td><td>${c.isPreserved?'<span class="tag t-red">是</span>':'否'}</td><td><span class="tag ${c.isClosed?'t-done':'t-active'}">${c.stage||'—'}</span></td><td>${c.hearingDate?c.hearingDate.replace(/^\d{4}-/,'').replace('T',' ').slice(0,11):'—'}</td><td>${c.caseNo||'—'}</td><td>${c.judge||'—'}</td><td>${c.isClosed?'<span class="tag t-done">是</span>':'否'}</td><td><button class="btn btn-outline btn-xs" onclick="quickClose('${c.id}')">✅</button><button class="btn btn-outline btn-xs" onclick="showCaseForm('${c.id}')">✏️</button><button class="btn btn-outline btn-xs" onclick="showCaseDetail('${c.id}')">📋</button><button class="btn btn-danger btn-xs" onclick="delCase('${c.id}')">🗑</button></td></tr>`).join(''):'<tr><td colspan="12" class="empty">暂无案件</td></tr>';
}
function showCaseForm(id){
  const c=id?cases.find(x=>x.id===id):null,d=c||{};
  const html=`<h3>${id?'编辑':'新增'}案件</h3><div class="form-grid">
    <div class="form-group"><label>接收日期</label><input id="cf_receiveDate" type="date" value="${(d.receiveDate||d.createdAt||T())}"></div>
    <div class="form-group"><label>原告</label><input id="cf_plaintiff" value="${d.plaintiff||d.client||''}" placeholder="多个用、分隔"></div>
    <div class="form-group"><label>被告</label><input id="cf_defendant" value="${d.defendant||d.opponent||''}" placeholder="多个用、分隔"></div>

// ====== 日程管理 ======
function renderSchedulePage(){
  const today=new Date();today.setHours(0,0,0,0);
  const y=today.getFullYear(),mo=today.getMonth();
  const allEvents=cases.filter(c=>!c.isClosed).flatMap(c=>[{l:'开庭',d:c.hearingDate,c:c,t:'hearing'},{l:'举证期限',d:c.evidenceDeadline,c:c,t:'deadline'}].filter(x=>x.d)).sort((a,b)=>new Date(a.d)-new Date(b.d));
  const upcoming=allEvents.filter(e=>new Date(e.d)>=today);
  const firstDay=new Date(y,mo,1).getDay(),daysInMonth=new Date(y,mo+1,0).getDate();
  let cal='<div class="calendar">'+['日','一','二','三','四','五','六'].map(d=>`<div class="day-header">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++)cal+='<div class="day"></div>';
  for(let d=1;d<=daysInMonth;d++){const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const dayEvts=allEvents.filter(e=>e.d&&e.d.startsWith(ds)).slice(0,3);const isToday=d===today.getDate()&&mo===today.getMonth()&&y===today.getFullYear();cal+=`<div class="day${isToday?' today':''}" onclick="showDayEvents('${ds}')"><div style="font-weight:500">${d}</div>${dayEvts.map(e=>`<div class="day-event ${e.t}">${e.l}</div>`).join('')}</div>`}
  cal+='</div>';
  return`<div class="card"><h3>🔔 近期日程</h3>${upcoming.length?upcoming.slice(0,15).map(e=>{const diff=Math.ceil((new Date(e.d)-today)/86400000);const bc=diff===0?'days-red':diff<=2?'days-orange':diff<=7?'days-blue':'days-green';const bt=diff===0?'⚠️ 今天':diff===1?'⚠️ 明天':diff+'天后';return`<div class="schedule-item" style="border-left-color:${e.t==='hearing'?'var(--red)':'var(--blue)'}"><span><strong>${e.l}</strong>：<span style="font-size:15px;font-weight:600;color:${diff<=2?'var(--red)':'var(--blue)'}">${(e.d||'').replace(/^\d{4}-/,'').replace('T',' ').slice(0,11)}</span></span><span style="display:flex;align-items:center;gap:12px"><span style="font-size:12px">${e.c.caseNo||'无案号'} | ${P(e.c)}</span><span class="days-badge ${bc}">${bt}</span></span></div>`}).join(''):'<div class="empty">暂无日程</div>'}</div>
  <div class="card" style="padding:12px"><h3 style="font-size:13px;margin-bottom:6px">📅 ${y}年${mo+1}月</h3>${cal}</div>`;
}
function showDayEvents(ds){const de=cases.filter(c=>!c.isClosed).flatMap(c=>[{l:'开庭',d:c.hearingDate,c:c},{l:'举证期限',d:c.evidenceDeadline,c:c}].filter(x=>x.d&&x.d.startsWith(ds)));alert(ds+' 日程：\n'+de.map(e=>e.l+' | '+(e.c.caseNo||'无案号')+' | '+P(e.c)).join('\n')||'无日程')}

      cases=d1;docs=d2;notices=d3;
      localStorage.setItem('lawyer_cases',JSON.stringify(cases));
      localStorage.setItem('lawyer_docs',JSON.stringify(docs));
      localStorage.setItem('lawyer_notices',JSON.stringify(notices));
      m.textContent='✅ 下载成功（'+cases.length+'案件/'+docs.length+'文档/'+notices.length+'通知），请切换到其他页面查看';
    }else{m.textContent='⚠️ 云端无数据'}
  }catch(e){m.textContent='❌ 下载失败：'+e.message}
}
function exportData(){const b=new Blob([JSON.stringify({cases,docs,notices,tags},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='案件备份-'+T()+'.json';a.click()}
function importData(){const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);cases=d.cases||[];docs=d.docs||[];notices=d.notices||[];tags=d.tags||[];save();alert('导入成功');navTo('dashboard')}catch(ex){alert('文件错误')}};r.readAsText(f)};i.click()}
function exportCSV(){let csv='接收日期,原告,被告,案由,管辖法院,是否保全,进行阶段,开庭时间,案号,承办法官,是否结案,律师,电话,收费,举证期限,判决日期,备注\n';cases.forEach(c=>{csv+=`"${(c.receiveDate||c.createdAt||'').split('T')[0]}","${P(c)}","${D(c)}","${c.caseType||''}","${c.court||''}","${c.isPreserved?'是':'否'}","${c.stage||''}","${c.hearingDate||''}","${c.caseNo||''}","${c.judge||''}","${c.isClosed?'是':'否'}","${c.lawyer||''}","${c.phone||''}","${c.fee||''}","${c.evidenceDeadline||''}","${c.judgmentDate||''}","${c.note||''}"\n`});const b=new Blob(['﻿'+csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='案件数据-'+T()+'.csv';a.click()}
function importCSV(){
  const i=document.createElement('input');i.type='file';i.accept='.csv,.xlsx,.xls';i.onchange=e=>{
    const f=e.target.files[0];if(!f)return;const ext=f.name.split('.').pop().toLowerCase();
    const processRows=rows=>{if(rows.length<2)return alert('文件为空');const h=rows[0];let imp=0;for(let i=1;i<rows.length;i++){const r=rows[i];if(r.filter(c=>c).length<3)continue;const d={id:uid(),receiveDate:(r[h.findIndex(x=>x.includes('接收日期'))]||r[0]||''),plaintiff:(r[h.findIndex(x=>x.includes('原告'))]||r[1]||''),defendant:(r[h.findIndex(x=>x.includes('被告'))]||r[2]||''),caseType:(r[h.findIndex(x=>x.includes('案由'))]||r[3]||''),court:(r[h.findIndex(x=>x.includes('管辖法院'))]||r[4]||''),isPreserved:(r[h.findIndex(x=>x.includes('保全'))]||r[5]||'')==='是',stage:(r[h.findIndex(x=>x.includes('阶段'))]||r[6]||''),hearingDate:(r[h.findIndex(x=>x.includes('开庭'))]||r[7]||''),caseNo:(r[h.findIndex(x=>x.includes('案号'))]||r[8]||''),judge:(r[h.findIndex(x=>x.includes('法官'))]||r[9]||''),isClosed:(r[h.findIndex(x=>x.includes('结案'))]||r[10]||'')==='是',lawyer:(r[h.findIndex(x=>x.includes('律师'))]||r[11]||''),fee:(r[h.findIndex(x=>x.includes('收费'))]||r[12]||''),phone:(r[h.findIndex(x=>x.includes('电话'))]||r[13]||''),evidenceDeadline:(r[h.findIndex(x=>x.includes('举证'))]||r[14]||''),judgmentDate:(r[h.findIndex(x=>x.includes('判决'))]||r[15]||''),note:(r[h.findIndex(x=>x.includes('备注'))]||r[16]||'')};const ex=cases.find(c=>c.caseNo&&d.caseNo&&c.caseNo===d.caseNo);if(ex){Object.assign(ex,d)}else{cases.push(d)}imp++}save();alert(`导入完成，新增/更新${imp}条`);navTo('cases')};
    if(ext==='xlsx'||ext==='xls'){if(!XLSX_LOADED){alert('XLSX组件加载失败，请先将文件另存为CSV再导入。');return}const r=new FileReader();r.onload=ev=>{const wb=XLSX.read(ev.target.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''}).map(r=>r.map(c=>String(c).trim()));processRows(rows)};r.readAsArrayBuffer(f)}else{const r=new FileReader();r.onload=ev=>{const rows=ev.target.result.split('\n').filter(l=>l.trim()).map(l=>{const cols=[];let cur='',q=false;for(const ch of l){if(ch=='"'){q=!q}else if(ch===','&&!q){cols.push(cur.replace(/^"|"$/g,'').trim());cur=''}else{cur+=ch}}cols.push(cur.replace(/^"|"$/g,'').trim());return cols});processRows(rows)};r.readAsText(f)}};i.click()}

function openModal(html){let m=document.getElementById('modal');if(!m){m=document.createElement('div');m.id='modal';m.className='modal-overlay';m.innerHTML='<div class="modal-content" id="modalContent"></div>';m.onclick=function(e){if(e.target===this)closeModal()};document.body.appendChild(m)}document.getElementById('modalContent').innerHTML=html;m.classList.add('show')}
function closeModal(){const m=document.getElementById('modal');if(m)m.classList.remove('show')}

setInterval(()=>{const el=document.getElementById('clock');if(el)el.textContent=new Date().toLocaleString('zh-CN')},1000);

    if(notices.length)localStorage.setItem(LS_N,JSON.stringify(notices));
  }catch(e){}

  navTo('dashboard');
})();
