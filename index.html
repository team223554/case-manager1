<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>律师案件管理系统</title>
<style>

<script>
var SB=window.supabase.createClient("https://zeoijvshyxuqakruhejz.supabase.co","sb_publishable_i6DaaPEmzECw7RtZ2_O2Yg_Pp-EXMOG");

async function loadData(){if(!currentUser)return;var uid=currentUser.id;var r=await Promise.all([SB.from("cases").select("*").order("createdAt",{ascending:false}).eq("user_id",uid),SB.from("docs").select("*").eq("user_id",uid),SB.from("notices").select("*").eq("user_id",uid),SB.from("tags").select("*").eq("user_id",uid)]);cases=r[0].data||[];docs=r[1].data||[];notices=r[2].data||[];tags=r[3].data||[]}

function toggleMode(){loginMode=loginMode==="login"?"register":"login";document.getElementById("loginBtn").textContent=loginMode==="login"?"登 录":"注 册";document.getElementById("loginTip").textContent=loginMode==="login"?"还没有账号？注册新账号":"已有账号？去登录"}
async function doLogin(){
var e=document.getElementById("_em").value.trim(),p=document.getElementById("_pw").value,err=document.getElementById("loginErr");err.textContent="";
if(!e||!p){err.textContent="请输入邮箱和密码";return}if(p.length<6){err.textContent="密码至少6位";return}
if(document.getElementById("_remember").checked){localStorage.setItem("savedEmail",e)}else{localStorage.removeItem("savedEmail")}
document.getElementById("loginBtn").disabled=true;document.getElementById("loginBtn").textContent="请稍候...";
try{var r=loginMode==="register"?await SB.auth.signUp({email:e,password:p}):await SB.auth.signInWithPassword({email:e,password:p});
if(r.error){err.textContent=r.error.message}
else if(loginMode==="register"&&!r.data.session){err.textContent="注册成功，正在登录...";setTimeout(async function(){var r2=await SB.auth.signInWithPassword({email:e,password:p});if(r2.error)err.textContent=r2.error.message},1500)}
}catch(ex){err.textContent="错误: "+ex.message}
document.getElementById("loginBtn").disabled=false;document.getElementById("loginBtn").textContent=loginMode==="login"?"登 录":"注 册"}
async function doLogout(){await SB.auth.signOut()}
SB.auth.onAuthStateChange(function(ev,s){if(s&&s.user){currentUser=s.user;document.getElementById("loginBox").style.display="none";document.getElementById("app").style.display="block";document.getElementById("sidebarUser").textContent=s.user.email;loadData().then(function(){nav("dash")})}else{currentUser=null;document.getElementById("loginBox").style.display="flex";document.getElementById("app").style.display="none"}});

function nav(page){document.getElementById("sideNav").innerHTML=pages.map(function(p){return'<a'+(p===page?' class="on"':'')+' onclick="nav(\''+p+'\')">'+titles[p]+"</a>"}).join("");document.getElementById("pageTitle").textContent=titles[page];var fns={dash:renderDash,cases:renderCases,schedule:renderSchedule,notices:renderNotices,docs:renderDocs,tools:renderTools,links:renderLinks,settings:renderSettings};document.getElementById("pageContent").innerHTML=fns[page]();if(page==="cases")setTimeout(refreshCaseTable,50);if(page==="docs")setTimeout(refreshDocs,50)}

function renderDash(){var total=cases.length,active=cases.filter(function(c){return !c.isClosed}).length,done=total-active;var today=new Date();today.setHours(0,0,0,0);var next7=new Date(today);next7.setDate(next7.getDate()+7);var upcoming=cases.filter(function(c){return !c.isClosed}).flatMap(function(c){return[{l:"开庭",d:c.hearingDate,c:c},{l:"举证期限",d:c.evidenceDeadline,c:c}].filter(function(x){return x.d})}).sort(function(a,b){return new Date(a.d)-new Date(b.d)});var urgent=upcoming.filter(function(x){var dd=new Date(x.d);return dd>=today&&dd<=next7});var pending=cases.filter(function(c){return !c.isClosed&&["待立案","待提交","等仲裁","等仲裁结果"].indexOf(c.stage||"")>=0});var trial=cases.filter(function(c){return !c.isClosed&&["待质证","待开庭"].indexOf(c.stage||"")>=0});var h='<div class="stats"><div class="stat" onclick="nav(\'cases\')"><div class="num">'+total+'</div><div class="label">案件总数</div></div><div class="stat orange"><div class="num">'+active+'</div><div class="label">未结案</div></div><div class="stat green"><div class="num">'+done+'</div><div class="label">已结案</div></div><div class="stat red"><div class="num">'+urgent.length+'</div><div class="label">7天内到期</div></div></div>';if(urgent.length)h+='<div class="card" style="background:linear-gradient(135deg,#fff1f0,#fff);border:2px solid var(--red)"><h3 style="color:var(--red);font-size:16px">🔴 紧急 — 7天内（'+urgent.length+'项）</h3>'+urgent.map(function(x){var diff=Math.ceil((new Date(x.d)-today)/86400000);var bc=diff===0?"days-red":diff<=2?"days-orange":"days-blue";var bt=diff===0?"⚠️今天":diff===1?"⚠️明天":diff+"天后";return'<div class="schedule-item"><span><strong>'+x.l+"</strong>："+(x.d||"").replace(/^\d{4}-/,"").replace("T"," ").slice(0,11)+"</span><span>"+(x.c.caseNo||"无案号")+" | "+P(x.c)+' <span class="days-badge '+bc+'">'+bt+"</span></span></div>"}).join("")+"</div>";h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div class="card"><h3>📋 待立案/提交/仲裁</h3><div style="text-align:center;font-size:36px;font-weight:bold;color:'+(pending.length?"var(--orange)":"var(--green)")+'">'+pending.length+'</div>'+pending.slice(0,5).map(function(x){return'<div style="padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:12px"><span>'+P(x)+'</span><span class="tag t-orange" style="float:right">'+(x.stage||"-")+"</span></div>"}).join("")+'</div><div class="card"><h3>⚖ 待质证/开庭</h3><div style="text-align:center;font-size:36px;font-weight:bold;color:'+(trial.length?"var(--red)":"var(--green)")+'">'+trial.length+'</div>'+trial.slice(0,5).map(function(x){return'<div style="padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:12px"><span>'+P(x)+'</span><span style="float:right;color:var(--orange)">'+(x.hearingDate?x.hearingDate.replace(/^\d{4}-/,"").replace("T"," ").slice(0,11):"未定")+"</span></div>"}).join("")+"</div></div>";return h}

function renderCases(){return'<div class="search-row"><input id="csSearch" placeholder="搜索..." oninput="refreshCaseTable()"><select id="csClosed" onchange="refreshCaseTable()"><option value="">全部</option><option value="0">未结案</option><option value="1">已结案</option></select></div><div class="btn-group"><button class="btn btn-blue" onclick="showCaseForm()">+ 新增</button><button class="btn btn-red btn-sm" onclick="batchDel()">批量删除</button></div><div class="card" style="overflow-x:auto"><table><thead><tr><th><input type="checkbox" id="selAll" onchange="toggleSelAll()"></th><th>接收日</th><th>原告</th><th>被告</th><th>案由</th><th>法院</th><th>保全</th><th>阶段</th><th>开庭</th><th>案号</th><th>法官</th><th>操作</th></tr></thead><tbody id="caseTbody"></tbody></table></div>'}
function refreshCaseTable(){var s=(document.getElementById("csSearch")?document.getElementById("csSearch").value:"").toLowerCase();var closed=document.getElementById("csClosed")?document.getElementById("csClosed").value:"";var filtered=cases.filter(function(c){if(closed==="1"&&!c.isClosed)return false;if(closed==="0"&&c.isClosed)return false;if(s){var h=(c.caseNo+(c.plaintiff||"")+(c.defendant||"")+c.caseType+c.court+c.judge+(c.stage||"")).toLowerCase();if(h.indexOf(s)<0)return false}return true});filtered.sort(function(a,b){return(a.isClosed?3:0)-(b.isClosed?3:0)||new Date(b.createdAt||0)-new Date(a.createdAt||0)});var el=document.getElementById("caseTbody");if(!el)return;el.innerHTML=filtered.length?filtered.map(function(c){return'<tr class="'+(c.isClosed?"dim":"")+'"><td><input type="checkbox" class="caseCheck" value="'+c.id+'"></td><td>'+(c.createdAt||"").split("T")[0]+"</td><td>"+P(c)+"</td><td>"+D(c)+"</td><td>"+(c.caseType||"-")+"</td><td>"+(c.court||"-")+"</td><td>"+(c.isPreserved?'<span class="tag t-red">是</span>':"否")+'</td><td><span class="tag '+(c.isClosed?"t-green":"t-blue")+'">'+(c.stage||"-")+'</span></td><td>'+(c.hearingDate?c.hearingDate.replace(/^\d{4}-/,"").replace("T"," ").slice(0,11):"-")+"</td><td>"+(c.caseNo||"-")+"</td><td>"+(c.judge||"-")+'</td><td><button class="btn btn-gray btn-xs" onclick="showCaseForm(\''+c.id+'\')">✏️</button><button class="btn btn-gray btn-xs" onclick="showDetail(\''+c.id+'\')">📋</button><button class="btn btn-red btn-xs" onclick="delCase(\''+c.id+'\')">🗑</button></td></tr>'}).join(""):'<tr><td colspan="12" class="empty">暂无案件</td></tr>'}
function showCaseForm(id){var c=id?cases.find(function(x){return x.id===id}):null,d=c||{};var h='<h3>'+(id?"编辑":"新增")+"案件</h3><div class='form-grid'>";h+='<div><label>接收日期</label><input id="cf_date" type="date" value="'+(d.createdAt||T())+'"></div>';h+='<div><label>原告</label><input id="cf_plaintiff" value="'+(d.plaintiff||"")+'"></div>';h+='<div><label>被告</label><input id="cf_defendant" value="'+(d.defendant||"")+'"></div>';h+='<div><label>案由</label><select id="cf_type"><option>民间借贷</option><option>劳动争议</option><option>交通事故</option><option>合同纠纷</option><option>婚姻家事</option><option>其他</option></select></div>';h+='<div><label>法院</label><input id="cf_court" value="'+(d.court||"")+'"></div>';h+='<div><label>保全</label><select id="cf_preserved"><option value="0">否</option><option value="1" '+(d.isPreserved?"selected":"")+'>是</option></select></div>';h+='<div><label>阶段</label><select id="cf_stage"><option>-</option><option>待立案</option><option>待开庭</option><option>待判决</option><option>待执行</option><option>已结案</option></select></div>';h+='<div><label>开庭</label><input id="cf_hearing" type="datetime-local" value="'+(d.hearingDate||"")+'"></div>';h+='<div><label>案号</label><input id="cf_caseNo" value="'+(d.caseNo||"")+'"></div>';h+='<div><label>法官</label><input id="cf_judge" value="'+(d.judge||"")+'"></div>';h+='<div><label>结案</label><select id="cf_closed"><option value="0">否</option><option value="1" '+(d.isClosed?"selected":"")+'>是</option></select></div>';h+='<div><label>备注</label><textarea id="cf_note">'+(d.note||"")+"</textarea></div>";h+='</div><div class="btn-group"><button class="btn btn-blue" onclick="saveCase()">💾 保存</button><button class="btn btn-gray" onclick="closeModal()">取消</button></div>';showModal(h);window._editId=id||null}
function saveCase(){var g=function(v){var el=document.getElementById("cf_"+v);return el?el.value:""};var data={id:window._editId||uid(),createdAt:g("date"),plaintiff:g("plaintiff"),defendant:g("defendant"),caseType:g("type"),court:g("court"),isPreserved:g("preserved")==="1",stage:g("stage"),hearingDate:g("hearing"),caseNo:g("caseNo"),judge:g("judge"),isClosed:g("closed")==="1",note:g("note")};if(window._editId){var i=cases.findIndex(function(c){return c.id===window._editId});if(i>=0)cases[i]=data}else{cases.push(data)}saveAll();closeModal();refreshCaseTable()}
function delCase(id){if(!confirm("确定删除？"))return;cases=cases.filter(function(c){return c.id!==id});saveAll();refreshCaseTable()}
function toggleSelAll(){document.querySelectorAll(".caseCheck").forEach(function(c){c.checked=document.getElementById("selAll").checked})}
function batchDel(){var ids=[].slice.call(document.querySelectorAll(".caseCheck:checked")).map(function(c){return c.value});if(!ids.length){alert("请勾选");return}if(!confirm("删除"+ids.length+"条？"))return;cases=cases.filter(function(c){return ids.indexOf(c.id)<0});saveAll();refreshCaseTable()}
function showDetail(id){var c=cases.find(function(x){return x.id===id});if(!c)return;showModal('<h3>📋 '+(c.caseNo||"无案号")+'</h3><div class="form-grid"><div><label>原告</label><div>'+P(c)+'</div></div><div><label>被告</label><div>'+D(c)+'</div></div><div><label>案由</label><div>'+(c.caseType||"-")+'</div></div><div><label>法院</label><div>'+(c.court||"-")+'</div></div><div><label>阶段</label><span class="tag '+(c.isClosed?"t-green":"t-blue")+'">'+(c.stage||"-")+'</span></div><div><label>开庭</label><div>'+(c.hearingDate||"-")+'</div></div><div><label>备注</label><div>'+(c.note||"无")+"</div></div></div>")}

function renderSchedule(){var today=new Date();today.setHours(0,0,0,0);var y=today.getFullYear(),mo=today.getMonth();var evts=cases.filter(function(c){return !c.isClosed}).flatMap(function(c){return[{l:"开庭",d:c.hearingDate,c:c},{l:"举证期限",d:c.evidenceDeadline,c:c}].filter(function(x){return x.d})}).sort(function(a,b){return new Date(a.d)-new Date(b.d)});var upcoming=evts.filter(function(e){return new Date(e.d)>=today});var fd=new Date(y,mo,1).getDay(),dim=new Date(y,mo+1,0).getDate();var cal='<div class="calendar">'+["日","一","二","三","四","五","六"].map(function(d){return'<div class="day-header">'+d+"</div>"}).join("");for(var i=0;i<fd;i++)cal+='<div class="day"></div>';for(var d=1;d<=dim;d++){var ds=y+"-"+String(mo+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");var de=evts.filter(function(e){return e.d&&e.d.split("T")[0]===ds}).slice(0,3);var isT=d===today.getDate()&&mo===today.getMonth();var boxMsg=ds+"\n"+de.map(function(e){return e.l+" | "+P(e.c)}).join("\n");cal+='<div class="day'+(isT?" today":"")+'" onclick="alert(\''+ds+"\\n"+de.map(function(e){return e.l+" | "+P(e.c)}).join("\\n")+'\')"><div style="font-weight:500">'+d+"</div>"+de.map(function(e){return'<div class="day-event '+(e.l==="开庭"?"hearing":"deadline")+'">'+e.l+"</div>"}).join("")+"</div>"}cal+="</div>";return'<div class="card"><h3>🔔 近期日程</h3>'+(upcoming.length?upcoming.slice(0,15).map(function(e){var diff=Math.ceil((new Date(e.d)-today)/86400000);var bc=diff===0?"days-red":diff<=2?"days-orange":diff<=7?"days-blue":"";var bt=diff===0?"⚠️今天":diff===1?"⚠️明天":diff+"天后";return'<div class="schedule-item"><span><strong>'+e.l+"</strong>："+(e.d||"").replace(/^\d{4}-/,"").replace("T"," ").slice(0,11)+"</span><span>"+(e.c.caseNo||"无案号")+" | "+P(e.c)+' <span class="days-badge '+bc+'">'+bt+"</span></span></div>"}).join(""):'<div class="empty">暂无日程</div>')+'</div><div class="card"><h3>📅 '+y+"年"+(mo+1)+'月</h3>'+cal+"</div>"}

var noticeFilter=null;function renderNotices(){var co=cases.map(function(c){return'<option value="'+c.id+'">'+(c.caseNo||"无案号")+" - "+P(c)+"</option>"}).join("");var h='<div class="card"><h3>📬 新增通知</h3><div class="form-grid"><div><label>案件</label><select id="nt_case">'+co+'</select></div><div><label>类型</label><select id="nt_type"><option>传票</option><option>判决书</option><option>裁定书</option><option>其他</option></select></div><div><label>开庭时间</label><input id="nt_hearDate" type="datetime-local"></div><div><label>开庭地点</label><input id="nt_hearPlace"></div><div><label>收到日期</label><input id="nt_date" type="date" value="'+T()+'"></div><div><label>上传文件</label><input id="nt_file" type="file" accept=".pdf,.jpg,.png,.jpeg,.webp" style="font-size:11px"></div><div><label>备注</label><input id="nt_note"></div></div><button class="btn btn-blue" style="margin-top:10px" onclick="addNotice()">+ 添加</button></div>';if(noticeFilter){var fc=cases.find(function(c){return c.id===noticeFilter});h+='<div class="card" style="background:#fffbe6"><span>🔍 筛选案件：'+(fc?fc.caseNo+" - "+P(fc):"")+' <button class="btn btn-gray btn-xs" onclick="noticeFilter=null;nav(\'notices\')">清除</button></span></div>'}var filtered=notices.filter(function(n){return !noticeFilter||n.caseId===noticeFilter});filtered.sort(function(a,b){var da=a.hearDate||a.date||"",db=b.hearDate||b.date||"";return new Date(da)-new Date(db)});h+='<div class="card"><h3>📋 通知列表（'+notices.length+"条，显示"+filtered.length+"条）</h3>'+filtered.map(function(n){var c=cases.find(function(x){return x.id===n.caseId});return'<div class="notice-item"><span>📬 <strong>'+n.type+"</strong>"+(n.hearDate?" 🕐"+n.hearDate.replace("T"," ").slice(0,16):"")+(n.hearPlace?" 📍"+n.hearPlace:"")+" | <span style=\"color:var(--blue);cursor:pointer\" onclick=\"noticeFilter='"+n.caseId+"';nav('notices')\">"+(c?c.caseNo:"未关联")+"</span> | "+n.date+(n.fileUrl?' <a href="'+n.fileUrl+'" target="_blank" style="color:var(--green)">📎文件</a>':"")+'</span><button class="btn btn-red btn-xs" onclick="delNotice(\''+n.id+'\')">🗑</button></div>'}).join("")||'<div class="empty">暂无</div>'+"</div>";return h}
async function addNotice(){var g=function(v){var el=document.getElementById("nt_"+v);return el?el.value:""};var fileEl=document.getElementById("nt_file");var fileUrl="";if(fileEl&&fileEl.files[0]){var f=fileEl.files[0];var ext=f.name.split(".").pop();var fname=uid()+"."+ext;var up=await SB.storage.from("notices").upload(fname,f);if(!up.error){var u2=SB.storage.from("notices").getPublicUrl(fname);fileUrl=u2.data.publicUrl}}notices.push({id:uid(),caseId:g("case"),type:g("type"),date:g("date"),hearDate:g("hearDate"),hearPlace:g("hearPlace"),fileUrl:fileUrl,note:g("note"),createdAt:new Date().toISOString()});saveAll();nav("notices")}
function addNotice(){var g=function(v){return document.getElementById("nt_"+v).value};notices.push({id:uid(),caseId:g("case"),type:g("type"),date:g("date"),note:g("note"),createdAt:new Date().toISOString()});saveAll();nav("notices")}
function delNotice(id){notices=notices.filter(function(n){return n.id!==id});saveAll();nav("notices")}

function renderDocs(){var co=cases.map(function(c){return'<option value="'+c.id+'">'+(c.caseNo||"无案号")+" - "+P(c)+"</option>"}).join("");return'<div class="card"><h3>📤 上传文档</h3><div class="form-grid"><div><label>案件</label><select id="doc_case">'+co+'</select></div><div><label>文档名</label><input id="doc_name" placeholder="如：起诉状"></div><div><label>链接</label><input id="doc_url" placeholder="网盘或本地路径"></div><div><label>类型</label><select id="doc_type"><option>起诉状</option><option>答辩状</option><option>判决书</option><option>裁定书</option><option>证据材料</option><option>代理词</option><option>其他</option></select></div></div><button class="btn btn-blue" style="margin-top:10px" onclick="addDoc()">+ 添加</button></div><div class="card"><h3>📁 文档列表（'+docs.length+'份）</h3><div id="docList"></div></div>'}
function refreshDocs(){var grouped={};docs.forEach(function(d){var c=cases.find(function(x){return x.id===d.caseId});var k=c?(c.caseNo||"无案号")+" - "+P(c):"未关联案件";if(!grouped[k])grouped[k]=[];grouped[k].push(d)});var el=document.getElementById("docList");if(!el)return;el.innerHTML=Object.entries(grouped).length?Object.entries(grouped).sort().map(function(e){return'<div style="margin-bottom:10px"><div style="font-weight:600;font-size:13px;color:#1a3c5e;padding:6px 0;border-bottom:2px solid #e8e8e8">📂 '+e[0]+"（"+e[1].length+"份）</div>"+e[1].map(function(d){return'<div class="doc-item"><span>📄 <strong>'+d.name+'</strong> <span class="tag">'+(d.type||"其他")+'</span></span><span><a href="'+(d.url||"#")+'" target="_blank" style="color:var(--blue);margin-right:10px;font-size:12px">打开</a><button class="btn btn-red btn-xs" onclick="delDoc(\''+d.id+'\')">🗑</button></span></div>'}).join("")+"</div>"}).join(""):'<div class="empty">暂无</div>'}
function addDoc(){var n=document.getElementById("doc_name").value.trim(),u=document.getElementById("doc_url").value.trim();if(!n||!u)return alert("请填写完整");docs.push({id:uid(),caseId:document.getElementById("doc_case").value,name:n,url:u,type:document.getElementById("doc_type").value,createdAt:new Date().toISOString()});saveAll();nav("docs")}
function delDoc(id){docs=docs.filter(function(d){return d.id!==id});saveAll();nav("docs")}

function renderTools(){return'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">'+["calcFee()|💰|诉讼费计算","showLPR()|📈|LPR利率查询","calcInterest()|🧮|逾期利息计算","calcInjury()|🏥|工伤待遇(九级)","calcComp()|💼|经济补偿金","calcDays()|📅|天数计算器","calcOT()|🕐|加班费计算","showLimits()|⏰|诉讼时效速查"].map(function(t){var p=t.split("|");return'<div class="tool-card" onclick="'+p[0]+'"><div style="font-size:28px;margin-bottom:8px">'+p[1]+'</div><div style="font-size:14px">'+p[2]+"</div></div>"}).join("")+"</div>"}
function calcFee(){var a=parseFloat(prompt("标的金额（元）：")||0),f=0;if(a<=1e4)f=50;else if(a<=1e5)f=a*.025-200;else if(a<=2e5)f=a*.02+300;else if(a<=5e5)f=a*.015+1300;else if(a<=1e6)f=a*.01+3800;else f=a*.005+8800;alert("诉讼费约：¥"+Math.ceil(f))}
function showLPR(){alert("一年期LPR：\n2024.10-至今：3.10%\n2024.07-10：3.35%\n2024.02-07：3.45%\n2023.08-2024.02：3.45%\n2023.06-08：3.55%\n2022.08-2023.06：3.65%")}
function calcInterest(){var p=parseFloat(prompt("本金：")||0),r=parseFloat(prompt("年利率(%)：")||3.1)/100,d=parseFloat(prompt("天数：")||0);alert("利息约：¥"+(p*r*d/365).toFixed(2))}
function calcInjury(){var s=parseFloat(prompt("月工资：")||0),a=parseFloat(prompt("统筹月均工资：")||0);alert("伤残补助金："+s*9+"\n医疗补助金："+a*10+"\n就业补助金："+a*10+"\n合计："+(s*9+a*20))}
function calcComp(){var h=new Date(prompt("入职日期(YYYY-MM-DD)：")),q=new Date(prompt("离职日期：")),s=parseFloat(prompt("月工资：")||0);var y=(q-h)/31536e6,n=Math.ceil(y*2)/2;alert(y.toFixed(1)+"年 → "+n+"个月\nN=¥"+(n*s).toFixed(0)+"\n2N=¥"+(n*s*2).toFixed(0))}
function calcDays(){var d1=new Date(prompt("起始日期：")),d2=new Date(prompt("结束日期："));alert("间隔："+Math.ceil((d2-d1)/864e5)+"天")}
function calcOT(){var s=parseFloat(prompt("月工资：")||0),h=s/21.75/8;var o1=parseFloat(prompt("延时加班(小时)：")||0),o2=parseFloat(prompt("休息日加班(小时)：")||0),o3=parseFloat(prompt("节假日加班(小时)：")||0);alert("加班费：¥"+(h*o1*1.5+h*o2*2+h*o3*3).toFixed(2))}
function showLimits(){alert("民间借贷/合同/侵权：3年\n劳动争议(一般)：1年\n工伤认定申请：1年\n行政诉讼：6个月\n执行申请：2年")}

function renderSettings(){return'<div class="card"><h3>💾 数据备份</h3><div class="btn-group"><button class="btn btn-blue" onclick="exportData()">📥 导出JSON备份</button><button class="btn btn-gray" onclick="importData()">📤 导入备份</button></div></div><div class="card"><h3>📊 数据迁移</h3><div class="btn-group"><button class="btn btn-blue" onclick="migrateLocal()">📤 从旧版导入</button><button class="btn btn-gray" onclick="exportCSV()">📤 导出CSV</button><button class="btn btn-gray" onclick="importCSV()">📥 导入CSV</button></div><p style="font-size:11px;color:#999;margin-top:8px">CSV列名：接收日期,原告,被告,案由,法院,阶段,开庭,案号,法官,结案(是/否)</p></div>'}
function exportData(){var b=new Blob([JSON.stringify({cases:cases,docs:docs,notices:notices,tags:tags},null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="案件备份-"+T()+".json";a.click()}
function importData(){var i=document.createElement("input");i.type="file";i.accept=".json";i.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);cases=d.cases||[];docs=d.docs||[];notices=d.notices||[];tags=d.tags||[];saveAll();alert("导入成功");nav("dash")}catch(ex){alert("文件错误")}};r.readAsText(f)};i.click()}
function migrateLocal(){var lc=JSON.parse(localStorage.getItem("lawyer_cases")||"[]");var ld=JSON.parse(localStorage.getItem("lawyer_docs")||"[]");var ln=JSON.parse(localStorage.getItem("lawyer_notices")||"[]");if(!lc.length&&!ld.length){alert("本地没有旧版数据");return}var count=0;lc.forEach(function(c){if(!cases.find(function(x){return x.id===c.id})){cases.push(c);count++}});ld.forEach(function(d){if(!docs.find(function(x){return x.id===d.id})){docs.push(d);count++}});ln.forEach(function(n){if(!notices.find(function(x){return x.id===n.id})){notices.push(n);count++}});saveAll();alert("迁移成功！导入"+count+"条");nav("dash")}
function exportCSV(){var csv="接收日期,原告,被告,案由,法院,阶段,开庭,案号,法官,结案\n";cases.forEach(function(c){csv+='"'+c.createdAt.split("T")[0]+'","'+P(c)+'","'+D(c)+'","'+(c.caseType||"")+'","'+(c.court||"")+'","'+(c.stage||"")+'","'+(c.hearingDate||"")+'","'+(c.caseNo||"")+'","'+(c.judge||"")+'","'+(c.isClosed?"是":"否")+'"\n'});var b=new Blob(["﻿"+csv],{type:"text/csv"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="案件数据-"+T()+".csv";a.click()}
function importCSV(){var i=document.createElement("input");i.type="file";i.accept=".csv,.xls,.xlsx";i.onchange=function(e){var f=e.target.files[0];if(!f)return;var ext=f.name.split(".").pop().toLowerCase();var r=new FileReader();r.onload=function(ev){var rows=[];if(ext==="xlsx"||ext==="xls"){try{var wb=XLSX.read(ev.target.result,{type:"array"});var ws=wb.Sheets[wb.SheetNames[0]];rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""}).map(function(r){return r.map(function(c){return String(c).trim()})})}catch(ex){alert("Excel读取失败，请另存为CSV再导入");return}}else{rows=ev.target.result.split("\n").filter(function(l){return l.trim()}).map(function(l){var cols=[],cur="",q=false;for(var j=0;j<l.length;j++){var ch=l[j];if(ch==='"')q=!q;else if(ch===","&&!q){cols.push(cur.replace(/(^"|"$)/g,"").trim());cur=""}else cur+=ch}cols.push(cur.replace(/(^"|"$)/g,"").trim());return cols})}if(rows.length<2){alert("文件为空");return}var h=rows[0];var idx=function(k){for(var i=0;i<h.length;i++){if(h[i]&&h[i].indexOf(k)>=0)return i}return -1};var i1=idx("接收"),i2=idx("原告"),i3=idx("被告"),i4=idx("案由"),i5=idx("法院"),i6=idx("阶段"),i7=idx("开庭"),i8=idx("案号"),i9=idx("法官"),i10=idx("结案"),i11=idx("保全"),i12=idx("备注"),i13=idx("举证"),i14=idx("判决"),i15=idx("律师"),i16=idx("收费");var imp=0;for(var k=1;k<rows.length;k++){var rw=rows[k];var g=function(i){return i>=0&&rw[i]?rw[i]:""};if(!rw.filter(function(c){return c}).length)continue;var d={id:uid(),createdAt:g(i1)||T(),plaintiff:g(i2),defendant:g(i3),caseType:g(i4),court:g(i5),stage:g(i6),hearingDate:g(i7),caseNo:g(i8),judge:g(i9),isClosed:g(i10)==="是"||g(i10)==="已结案",isPreserved:g(i11)==="是",evidenceDeadline:g(i13),judgmentDate:g(i14),lawyer:g(i15),fee:g(i16),note:g(i12)};cases.push(d);imp++}saveAll();alert("导入完成："+imp+"条");nav("cases")};if(ext==="xlsx"||ext==="xls")r.readAsArrayBuffer(f);else r.readAsText(f)};i.click()}
